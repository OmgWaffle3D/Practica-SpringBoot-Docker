<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Alumnos - Spring Boot + React</title>
    <meta name="description" content="Aplicación web para gestionar alumnos con Spring Boot y React" />
    
    <!-- Preload fonts for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Tailwind CSS will be processed by Vite -->
    <style>
      /* Loading spinner styles */
      .loading-spinner {
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      /* Initial loading screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .loading-text {
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 1.25rem;
        margin-top: 1rem;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BFBcK0C1.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DGVEVURX.css">
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="loading-spinner w-12 h-12 border-4 border-white border-t-transparent rounded-full"></div>
      <div class="loading-text">Cargando aplicación...</div>
    </div>
    
    <!-- React app root -->
    <div id="root" class="min-h-screen bg-gray-50" style="display: none;"></div>
    
    <!-- Main script -->
    
    <!-- Script to handle loading -->
    <script>
      // Show the app and hide loading screen when React is ready
      window.addEventListener('load', function() {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          const root = document.getElementById('root');
          
          if (loadingScreen && root) {
            loadingScreen.style.opacity = '0';
            root.style.display = 'block';
            
            setTimeout(() => {
              loadingScreen.remove();
            }, 500);
          }
        }, 1000); // Small delay to ensure React has mounted
      });
      
      // Fallback for older browsers
      document.addEventListener('DOMContentLoaded', function() {
        // Additional initialization if needed
        console.log('🚀 Aplicación de Gestión de Alumnos iniciada');
      });
    </script>
  </body>
</html>
